decisions_made:
  - decision: "Pivot from Global Payroll Nexus to US Payroll Guide"
    rationale: "Tom Daniel-Price briefing identified US payroll for foreign-owned companies as Teamed's key market opportunity. Old site was a generic international payroll encyclopedia with no focus."
    reversible: false
  - decision: "New brand kit — slate blue #2D5A7B, Inter font"
    rationale: "Differentiate from Teamed's own brand (purple/Montserrat) while maintaining visual continuity via shared lime accent and coral"
    reversible: true
  - decision: "Foreign-ownership compliance as key differentiator"
    rationale: "Form 5472, transfer pricing, pro forma 1120 — no competitor covers this. $25k penalty per form is a powerful fear-based hook."
    reversible: false
  - decision: "10 states seeded (DE, CA, NY, TX, FL, MA, WA, IL, CO, GA)"
    rationale: "Most common states for foreign company registration, covers ~80% of use cases"
    reversible: true
  - decision: "Keep Framer Motion in stack"
    rationale: "User explicitly requested animation framework be retained"
    reversible: true

